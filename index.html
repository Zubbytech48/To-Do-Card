<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Todo Card</title>

  <link rel="stylesheet" href="style.css">
 <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
 <body>

<article data-testid="test-todo-card">
  
  <div class="header">
    <h2 data-testid="test-todo-title">Develop your Porfolio😊</h2>
    <span class="badge high" data-testid="test-todo-priority" aria-label="High priority">
      High
    </span>
  </div>

  <p data-testid="test-todo-description">
    Create a clean and user friendly Portfolio for your Front-end Development.
  </p>

  <div class="meta">
   
      <time data-testid="test-todo-due-date" datetime="2026-04-16T18:00:00Z"></time>
       <i class="fa-solid fa-calendar"></i> Due April 16, 2026
    </time>

    <time data-testid="test-todo-time-remaining" aria-live="polite"></time>

    
  </div>
  <i class="fa-solid fa-clock"></i> Status Indicator
  <span class="status" data-testid="test-todo-status">
 
PENDING
</span>

  <div class="tags" role="list" data-testid="test-todo-tags">
    <i class="fa-solid fa-table-cells-large"></i>Categories
    <span class="tag" role="listitem" data-testid="test-todo-tag-work"> <i class="fa-solid fa-briefcase" aria-hidden="true"></i>Work</span>
    <span class="taged" role="listitem" data-testid="test-todo-taged-urgent"><i class="fa-solid fa-bolt" aria-hidden="true"></i>Urgent</span>
    
  </div>

  <div class="actions">
    <label>
      <input 
        type="checkbox"
        data-testid="test-todo-complete-toggle"
        aria-label="Mark task as complete"
         
      />
     Complete 
    </label>

    <div>
      <button class="edit" data-testid="test-todo-edit-button" aria-label="Edit task">
         <i class="fa-solid fa-pen"></i>
        Edit
      </button>
      <button class="delete" data-testid="test-todo-delete-button" aria-label="Delete task">
        <i class="fa-solid fa-trash"></i>
        Delete
      </button>
    </div>
  </div>

</article>

<script src="script.js"></script>

</body>
</html>
