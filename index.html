<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Todo Card</title>

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<article data-testid="test-todo-card" class="todo-card pending high">
  <div class="header">
    <div>
      <h2 data-testid="test-todo-title">Develop your Portfolio 😊</h2>
      <div class="priority-row">
        <span class="badge high" data-testid="test-todo-priority" aria-label="High priority">High</span>
        <!-- <span class="priority-indicator high" data-testid="test-todo-priority-indicator" aria-hidden="true"></span> -->
      </div>
    </div>
  </div>
  <div class="description-container collapsed" id="todo-description-section" data-testid="test-todo-collapsible-section">
    <p data-testid="test-todo-description">Create a clean and user friendly Portfolio for your Front-end Development.</p>
  </div>

   <div class="meta">
    <div class="due">
      <i class="fa-solid fa-calendar" aria-hidden="true"></i>
      <time data-testid="test-todo-due-date" datetime="2026-04-17T18:00:00Z">April 17, 2026</time>
      <!-- <div class="note-row"> -->
    <span class="overdue hidden" data-testid="test-todo-overdue-indicator"></span> 
    <span class="time-remaining" data-testid="test-todo-time-remaining" aria-live="polite"></span>
  <!-- </div> -->
    </div>

      <div class="note-row">
    <span class="overdue hidden" data-testid="test-todo-overdue-indicator"></span>
    <span class="time-remaining" data-testid="test-todo-time-remaining" aria-live="polite"></span>
  </div>

    <div class="status-line">
      <!-- <i class="fa-solid fa-clock" aria-hidden="true"></i> -->
      <span class="status" data-testid="test-todo-status">Pending</span>
    </div>
  </div>
  <i class="fa-solid fa-clock" aria-hidden="true"></i> Status 
    <label for="status-control" class="visually-hidden">Task status</label>
    <select id="status-control" class="status-control" data-testid="test-todo-status-control" aria-label="Task status">
      <option value="Pending">Pending</option>
      <option value="In Progress">In Progress</option>
      <option value="Done">Done</option>
    </select>

    <button type="button" class="expand-toggle" data-testid="test-todo-expand-toggle" aria-expanded="false" aria-controls="todo-description-section">
      Show more
    </button>

    <div class="tags" role="list" data-testid="test-todo-tags">
    <i class="fa-solid fa-table-cells-large"></i> Categories
    <span class="tag" role="listitem" data-testid="test-todo-tag-work"> <i class="fa-solid fa-briefcase" aria-hidden="true"></i>Work</span>
    <span class="taged" role="listitem" data-testid="test-todo-taged-urgent"><i class="fa-solid fa-bolt" aria-hidden="true"></i>Urgent</span>
    
  </div>

  

  <div class="actions">
    <div class="controls-row">
    <label class="checkbox-label">
      <input
        id="complete-toggle"
        type="checkbox"
        data-testid="test-todo-complete-toggle"
        aria-label="Mark task as complete"
      />
      Complete
    </label>
    </div>
    <button type="button" class="edit" data-testid="test-todo-edit-button" aria-label="Edit task">
      <i class="fa-solid fa-pen" aria-hidden="true"></i>
      Edit
    </button>
    <button type="button" class="delete" data-testid="test-todo-delete-button" aria-label="Delete task">
      <i class="fa-solid fa-trash" aria-hidden="true"></i>
      Delete
    </button>
  </div>
</article>

<script src="script.js"></script>

</body>
</html>
